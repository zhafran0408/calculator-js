<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueCalc Pro - Sliding Switch</title>
    <link rel="stylesheet" href="calculator.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <main id="calculator">
        <div class="calc-header">
            <div class="theme-toggle" onclick="toggleTheme()">
                <div class="toggle-pill" id="pill"></div>
                <i data-lucide="moon" class="toggle-icon" id="moon-icon"></i>
                <i data-lucide="sun" class="toggle-icon" id="sun-icon"></i>
            </div>
            <span class="brand">BLUECALC</span>
        </div>

        <div class="display-container">
            <div id="current-op"></div>
            <div id="value">0</div>
        </div>

        <div class="button-grid">
            <button onclick="clearDisplay()" class="btn-top">AC</button>
            <button onclick="toggleSign()" class="btn-top">+/-</button>
            <button onclick="deleteLast()" class="btn-top"><i data-lucide="delete"></i></button>
            <button onclick="appendOperator('/')" class="btn-op">/</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="appendOperator('*')" class="btn-op">×</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendOperator('-')" class="btn-op">−</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendOperator('+')" class="btn-op">+</button>

            <button onclick="appendNumber('0')" class="btn-zero">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button onclick="calculate()" class="btn-equal">=</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

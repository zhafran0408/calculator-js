<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./calculator.css" />
</head>
<body>
  <div id="welcome">
  <img src="./calculator-part-2-svgrepo-com.svg" alt="Logo" />
  <h1>BlueCalc</h1>
  <p style="opacity: 0.7; margin-bottom: 30px;">Cerdas, Cepat, Presisi.</p>
  <button onclick="startCalculator()">Mulai Berhitung</button>
</div>

<section id="calculator" style="display: none">
  <div id="value">0</div>
  <div class="grid-container">
    <button onclick="Clear()" class="clear">C</button>
    <button onclick="input('%')" class="operator">%</button>
    <button onclick="input('/')" class="operator">÷</button>
    <button onclick="deleteLast()" class="operator">⌫</button>

    <button onclick="input('7')">7</button>
    <button onclick="input('8')">8</button>
    <button onclick="input('9')">9</button>
    <button onclick="input('*')" class="operator">×</button>

    <button onclick="input('4')">4</button>
    <button onclick="input('5')">5</button>
    <button onclick="input('6')">6</button>
    <button onclick="input('-')" class="operator">-</button>

    <button onclick="input('1')">1</button>
    <button onclick="input('2')">2</button>
    <button onclick="input('3')">3</button>
    <button onclick="input('+')" class="operator">+</button>

    <button onclick="input('0')" class="zero">0</button>
    <button onclick="input('.')">.</button>
    <button onclick="Hasil()" class="equals">=</button>
  </div>
</section>
<script>
  const display = document.getElementById("value");

  function input(value) {
    if (display.innerText === "0" && value !== ".") {
      display.innerText = value;
    } else {
      display.innerText += value;
    }
  }

  function Clear() {
    display.innerText = "0";
  }

  function deleteLast() {
    if (display.innerText.length > 1) {
      display.innerText = display.innerText.slice(0, -1);
    } else {
      display.innerText = "0";
    }
  }

  function Hasil() {
    try {
      // Mengganti simbol visual dengan operator matematika asli
      let expression = display.innerText.replace(/×/g, '*').replace(/÷/g, '/');
      display.innerText = eval(expression);
    } catch {
      display.innerText = "Error";
      setTimeout(Clear, 1500);
    }
  }

  function startCalculator() {
    const welcome = document.getElementById("welcome");
    const calculator = document.getElementById("calculator");

    welcome.style.animation = "fadeOut 0.5s forwards";
    setTimeout(() => {
      welcome.style.display = "none";
      calculator.style.display = "block";
      // Animasi muncul untuk kalkulator
      calculator.style.animation = "fadeIn 0.5s ease-in";
    }, 500);
  }
</script>
</body>
</html>
